<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>библ • художественная выставка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background-color: #faf9f7;
            color: #1e1e1e;
            line-height: 1.6;
            font-size: 16px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 5%;
        }

        header {
            border-bottom: 1px solid #d0d0d0;
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: lowercase;
            border: 1px solid #333;
            padding: 5px 15px;
            display: inline-block;
            line-height: 1.2;
            cursor: pointer;
        }

        nav {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        nav button {
            background: none;
            border: none;
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-family: 'Georgia', serif;
            color: #3a3a3a;
            cursor: pointer;
            padding: 5px 0;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
        }

        nav button:hover {
            border-bottom: 2px solid #aaa;
        }

        nav button.active {
            border-bottom: 2px solid #1e1e1e;
            font-weight: bold;
        }

        .page { display: none; min-height: 50vh; }
        .page.active { display: block; }

        h1 {
            font-weight: 300;
            font-size: clamp(2rem, 5vw, 2.8rem);
            letter-spacing: 2px;
            margin-bottom: 30px;
            border-left: 3px solid #1e1e1e;
            padding-left: 20px;
        }

        .art-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px 25px;
            margin-top: 30px;
        }

        .art-card {
            background-color: white;
            border: 1px solid #eaeaea;
            padding: 20px 15px 20px 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .art-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }

        .art-image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1.1;
            margin-bottom: 15px;
            cursor: pointer;
            overflow: hidden;
            background: #f0f0f0;
        }

        .art-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
        }

        .art-image-container:hover .art-image {
            transform: scale(1.02);
        }

        .image-error {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eee;
            color: #666;
            font-style: italic;
            padding: 20px;
            text-align: center;
        }

        .zoom-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.9);
            border: 1px solid #1e1e1e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .art-image-container:hover .zoom-icon { opacity: 1; }

        .art-title {
            font-size: 1.4rem;
            font-weight: 400;
            margin-bottom: 5px;
        }

        .art-description {
            color: #5a5a5a;
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-style: italic;
        }

        .art-price {
            font-size: 1.3rem;
            font-weight: 300;
            color: #2b5e2b;
            margin-top: auto;
            border-top: 1px dashed #ccc;
            padding-top: 12px;
        }

        .contact-block {
            margin-top: 40px;
            padding: 25px 20px;
            background: #f3f2f0;
            border: 1px solid #d4d4d4;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 25px;
            position: relative;
        }

        .contact-block a {
            color: #1e1e1e;
            text-decoration: none;
            border-bottom: 1px dotted #777;
            transition: border-bottom 0.2s;
        }

        .contact-block a:hover {
            border-bottom: 1px solid #1e1e1e;
        }

        .edit-btn, .add-btn, .edit-contacts-btn, .edit-bio-btn {
            background: white;
            border: 1px solid #1e1e1e;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.2s, color 0.2s;
        }

        .edit-btn:hover, .add-btn:hover, .edit-contacts-btn:hover, .edit-bio-btn:hover {
            background: #1e1e1e;
            color: white;
        }

        .admin-mode .edit-btn,
        .admin-mode .add-btn,
        .admin-mode .edit-contacts-btn,
        .admin-mode .edit-bio-btn {
            display: flex;
        }

        .add-btn {
            border-radius: 40px;
            width: auto;
            padding: 0 20px;
            gap: 5px;
            margin: 20px 0 30px;
            display: none;
        }

        .admin-mode .add-btn {
            display: inline-flex;
        }

        .edit-contacts-btn {
            position: absolute;
            top: -18px;
            right: 20px;
            background: #1e1e1e;
            color: white;
            border: none;
            width: auto;
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 0.9rem;
            gap: 5px;
        }

        .edit-contacts-btn:hover {
            background: #333;
        }

        .artist-bio {
            font-size: 1.2rem;
            white-space: pre-line;
            max-width: 800px;
            margin: 0 auto 30px;
            padding: 30px;
            background: rgba(255,255,255,0.7);
            position: relative;
            border: 1px solid transparent;
            border-radius: 4px;
            line-height: 1.8;
        }
        
        .admin-mode .artist-bio { 
            border: 1px dashed #aaa;
        }

        .edit-bio-btn {
            position: absolute;
            top: 10px;
            right: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 15px;
            backdrop-filter: blur(3px);
        }
        .modal.active { display: flex; }

        .modal-content {
            background: white;
            padding: 35px 30px;
            max-width: 550px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .modal-content h3 {
            font-weight: 300;
            font-size: 2rem;
            margin-bottom: 25px;
            border-left: 3px solid #1e1e1e;
            padding-left: 15px;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #bbb;
            font-family: 'Georgia', serif;
            font-size: 1rem;
            border-radius: 2px;
        }

        .modal-content input:focus,
        .modal-content textarea:focus {
            outline: none;
            border-color: #1e1e1e;
        }

        .upload-area {
            margin: 15px 0;
            padding: 15px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .upload-area:hover { border-color: #1e1e1e; }
        .upload-area.drag-over { border-color: #2b5e2b; background: #f0f8f0; }
        
        .modal-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .modal-content button {
            padding: 12px 30px;
            background: #1e1e1e;
            color: white;
            border: none;
            font-family: 'Georgia', serif;
            cursor: pointer;
            flex: 1 1 auto;
            transition: background 0.2s;
            border-radius: 2px;
        }

        .modal-content button:hover {
            background: #333;
        }

        .modal-content button.cancel {
            background: #8f8f8f;
        }

        .modal-content button.cancel:hover {
            background: #a0a0a0;
        }

        .modal-content button.delete-confirm {
            background: #c0392b;
        }

        .zoom-modal .modal-content {
            max-width: 900px;
            background: white;
            padding: 20px;
        }

        .zoom-image {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
            background: #f5f5f5;
        }

        .zoom-details {
            margin-top: 20px;
            text-align: center;
        }

        /* Тетрис стили */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 30px;
            background: #1e1e1e;
            color: #faf9f7;
            border-radius: 8px;
        }

        canvas#tetrisCanvas {
            border: 2px solid #faf9f7;
            background: #000;
            width: 100%;
            max-width: 300px;
            height: auto;
            aspect-ratio: 1/2;
        }

        .game-controls {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-btn {
            padding: 10px 20px;
            background: #faf9f7;
            color: #1e1e1e;
            border: none;
            font-family: 'Georgia', serif;
            cursor: pointer;
            border-radius: 2px;
            min-width: 60px;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .game-btn:hover { 
            background: #fff;
            transform: scale(1.05);
        }

        .mobile-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 10px;
        }

        .mobile-controls .game-btn {
            width: 70px;
            height: 70px;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
            color: #faf9f7;
            border: 1px solid #faf9f7;
        }

        .score {
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        @media (max-width: 600px) {
            header { flex-direction: column; align-items: flex-start; }
            nav { width: 100%; justify-content: space-around; }
            .art-grid { gap: 20px; }
            .contact-block { flex-direction: column; gap: 15px; }
            .mobile-controls .game-btn { width: 55px; height: 55px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <header>
            <div class="logo">библ</div>
            <nav>
                <button class="nav-btn active" data-page="about">О художнице</button>
                <button class="nav-btn" data-page="exhibition">Выставка</button>
                <button class="nav-btn" data-page="shop">Магазин</button>
                <button class="nav-btn" data-page="game">Игра</button>
            </nav>
        </header>

        <div id="loginModal" class="modal">
            <div class="modal-content">
                <h3>вход для художницы</h3>
                <input type="password" id="passwordInput" placeholder="секретный пароль">
                <div class="modal-buttons">
                    <button id="submitPassword">Войти</button>
                    <button class="cancel" id="cancelLogin">Отмена</button>
                </div>
            </div>
        </div>

        <div id="editModal" class="modal">
            <div class="modal-content" id="editModalContent"></div>
        </div>

        <div id="zoomModal" class="modal zoom-modal">
            <div class="modal-content zoom-content">
                <img id="zoomImage" class="zoom-image" src="" alt="Увеличенное изображение">
                <div class="zoom-details">
                    <h3 id="zoomTitle"></h3>
                    <p id="zoomDescription"></p>
                    <button class="cancel" onclick="document.getElementById('zoomModal').classList.remove('active')">Закрыть</button>
                </div>
            </div>
        </div>

        <section id="aboutPage" class="page active">
            <h1>библ</h1>
            <div class="artist-bio" id="artistBioDisplay"></div>
        </section>

        <section id="exhibitionPage" class="page">
            <h1>выставка</h1>
            <div class="admin-actions">
                <button class="add-btn" id="addExhibitionBtn">➕ Добавить работу</button>
            </div>
            <div class="art-grid" id="exhibitionGrid"></div>
        </section>

        <section id="shopPage" class="page">
            <h1>магазин</h1>
            <div class="admin-actions">
                <button class="add-btn" id="addShopBtn">➕ Добавить товар</button>
            </div>
            <div class="art-grid" id="shopGrid"></div>
            <div class="contact-block" id="contactsBlock"></div>
        </section>

        <section id="gamePage" class="page">
            <h1>тетрис / пауза</h1>
            <div class="game-container">
                <canvas id="tetrisCanvas" width="300" height="600"></canvas>
                <div class="score" id="gameScore">0</div>
                <div class="game-controls">
                    <button class="game-btn" id="newGameBtn">Новая</button>
                    <button class="game-btn" id="pauseGameBtn">Пауза</button>
                </div>
                <div class="mobile-controls">
                    <button class="game-btn" id="moveLeftBtn">←</button>
                    <button class="game-btn" id="rotateBtn">↻</button>
                    <button class="game-btn" id="moveRightBtn">→</button>
                    <button class="game-btn" id="moveDownBtn">↓</button>
                </div>
                <p style="color: #aaa;">← → движение, ↑ поворот, ↓ ускорение</p>
            </div>
        </section>
    </div>

    <script>
        (function() {
            // ========== НАСТРОЙКИ ==========
            const ADMIN_PASSWORD = 'BiblVeta098123';
            const STORAGE_KEY = 'bibl_gallery_data';
            
            // Состояние
            let isAdmin = false;
            let artworks = { exhibition: [], shop: [] };
            let artistBio = "Художница из Петербурга. Работаю с маслом, акрилом, текстилем. Вдохновляюсь городскими пейзажами и тихими моментами.";
            let contacts = { 
                tg: "@gbibi_art", 
                wa: "+7 999 123-45-67", 
                vk: "vk.com/gbibi_art", 
                tgk: "t.me/gbibi_channel" 
            };

            // Проверяем сессию админа
            if (sessionStorage.getItem('bibl_admin') === 'true') {
                isAdmin = true;
                document.body.classList.add('admin-mode');
            }
            
            // Проверяем URL для входа
            if (window.location.search.includes('bibl_edit')) {
                document.getElementById('loginModal').classList.add('active');
            }

            // ========== ЗАГРУЗКА / СОХРАНЕНИЕ ==========
            function loadData() {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        artworks = data.artworks || { exhibition: [], shop: [] };
                        artistBio = data.artistBio || artistBio;
                        contacts = data.contacts || contacts;
                    } catch(e) {}
                }
                renderAll();
            }

            function saveData() {
                const data = { artworks, artistBio, contacts };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                renderAll();
                if (isAdmin) {
                    showGistHelper();
                }
            }
            
            function showGistHelper() {
                const jsonData = JSON.stringify({ artworks, artistBio, contacts }, null, 2);
                const modal = document.getElementById('editModal');
                const content = document.getElementById('editModalContent');
                content.innerHTML = `
                    <h3>📦 Резервная копия</h3>
                    <p style="margin-bottom: 15px;">Данные сохранены в браузере. Чтобы перенести на другой компьютер, скопируйте JSON:</p>
                    <textarea id="backupJson" rows="10" style="width:100%; font-family: monospace; font-size:12px;" readonly>${escapeHtml(jsonData)}</textarea>
                    <div class="modal-buttons">
                        <button id="copyBackupBtn">📋 Скопировать</button>
                        <button class="cancel" id="closeBackupBtn">Закрыть</button>
                    </div>
                `;
                modal.classList.add('active');
                document.getElementById('copyBackupBtn').onclick = () => {
                    const textarea = document.getElementById('backupJson');
                    textarea.select();
                    document.execCommand('copy');
                    alert('JSON скопирован!');
                };
                document.getElementById('closeBackupBtn').onclick = () => modal.classList.remove('active');
            }

            // ========== ЗАГРУЗКА НА ImgPeek (российский хостинг) ==========
            async function uploadToImgPeek(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = async function(e) {
                        try {
                            const base64 = e.target.result.split(',')[1];
                            const formData = new FormData();
                            formData.append('image', file);
                            
                            // Прокси через бесплатный сервис загрузки (работает в РФ)
                            const response = await fetch('https://tmpfiles.org/api/v1/upload', {
                                method: 'POST',
                                body: formData
                            });
                            const result = await response.json();
                            if (result.status === 'success' && result.data.url) {
                                resolve(result.data.url);
                            } else {
                                throw new Error('Upload failed');
                            }
                        } catch(err) {
                            reject(err);
                        }
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

            // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
            function escapeHtml(text) {
                if (!text) return '';
                return String(text).replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                    return c;
                });
            }

            function openAddModal(type) {
                if (!isAdmin) return;
                const modal = document.getElementById('editModal');
                const content = document.getElementById('editModalContent');
                const isShop = type === 'shop';
                content.innerHTML = `
                    <h3>${isShop ? '➕ Добавить товар' : '🖼️ Добавить работу'}</h3>
                    <input id="modalTitle" placeholder="Название" value="Без названия">
                    <textarea id="modalDesc" placeholder="Описание" rows="2"></textarea>
                    ${isShop ? '<input id="modalPrice" placeholder="Цена" value="цена по запросу">' : ''}
                    
                    <div class="upload-area" id="uploadArea">
                        📸 Нажмите или перетащите фото сюда<br>
                        <small>Поддерживаются JPG, PNG, GIF, WEBP</small>
                        <input type="file" id="imageUpload" accept="image/*" style="display:none">
                    </div>
                    <div id="uploadPreview" style="margin-top:10px; display:none;">
                        <img id="previewImg" style="max-width:100%; max-height:150px; border-radius:4px;">
                        <div id="uploadStatus" style="font-size:0.85rem; margin-top:5px;"></div>
                    </div>
                    
                    <div class="modal-buttons">
                        <button id="saveItemBtn">Сохранить</button>
                        <button class="cancel" id="cancelModal">Отмена</button>
                    </div>
                `;
                modal.classList.add('active');
                
                let uploadedUrl = null;
                const uploadArea = document.getElementById('uploadArea');
                const fileInput = document.getElementById('imageUpload');
                const previewDiv = document.getElementById('uploadPreview');
                const previewImg = document.getElementById('previewImg');
                const uploadStatus = document.getElementById('uploadStatus');
                
                uploadArea.addEventListener('click', () => fileInput.click());
                uploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadArea.classList.add('drag-over');
                });
                uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
                uploadArea.addEventListener('drop', async (e) => {
                    e.preventDefault();
                    uploadArea.classList.remove('drag-over');
                    const file = e.dataTransfer.files[0];
                    if (file && file.type.startsWith('image/')) {
                        await handleFileUpload(file);
                    } else {
                        alert('Пожалуйста, загрузите изображение');
                    }
                });
                
                fileInput.addEventListener('change', async (e) => {
                    if (e.target.files[0]) await handleFileUpload(e.target.files[0]);
                });
                
                async function handleFileUpload(file) {
                    previewImg.src = URL.createObjectURL(file);
                    previewDiv.style.display = 'block';
                    uploadStatus.textContent = '⏳ Загрузка на сервер...';
                    try {
                        uploadedUrl = await uploadToImgPeek(file);
                        uploadStatus.innerHTML = `✅ Загружено! <a href="${uploadedUrl}" target="_blank">открыть</a>`;
                    } catch(err) {
                        uploadStatus.textContent = '❌ Ошибка загрузки, попробуйте другой файл';
                        uploadedUrl = null;
                    }
                }
                
                document.getElementById('saveItemBtn').onclick = () => {
                    const title = document.getElementById('modalTitle').value.trim() || 'Без названия';
                    const desc = document.getElementById('modalDesc').value || '';
                    const price = isShop ? document.getElementById('modalPrice').value || 'цена по запросу' : undefined;
                    
                    if (!uploadedUrl) {
                        alert('Пожалуйста, загрузите изображение');
                        return;
                    }
                    
                    const newItem = {
                        id: Date.now() + Math.random() * 10000,
                        title: title,
                        description: desc,
                        image_url: uploadedUrl
                    };
                    if (isShop) newItem.price = price;
                    
                    artworks[type].push(newItem);
                    saveData();
                    modal.classList.remove('active');
                };
                document.getElementById('cancelModal').onclick = () => modal.classList.remove('active');
            }

            function deleteItem(id, section) {
                if (!isAdmin) return;
                const modal = document.getElementById('editModal');
                const content = document.getElementById('editModalContent');
                content.innerHTML = `
                    <h3>🗑️ Удалить работу?</h3>
                    <p style="margin-bottom:30px;">Это действие нельзя отменить.</p>
                    <div class="modal-buttons">
                        <button class="delete-confirm" id="confirmDelete">Да, удалить</button>
                        <button class="cancel" id="cancelModal">Отмена</button>
                    </div>
                `;
                modal.classList.add('active');
                document.getElementById('confirmDelete').onclick = () => {
                    artworks[section] = artworks[section].filter(item => String(item.id) !== String(id));
                    saveData();
                    modal.classList.remove('active');
                };
                document.getElementById('cancelModal').onclick = () => modal.classList.remove('active');
            }

            function openEditBioModal() {
                if (!isAdmin) return;
                const modal = document.getElementById('editModal');
                const content = document.getElementById('editModalContent');
                content.innerHTML = `
                    <h3>✎ Редактировать описание</h3>
                    <textarea id="modalBio" rows="6" placeholder="Расскажите о себе...">${escapeHtml(artistBio)}</textarea>
                    <div class="modal-buttons">
                        <button id="saveBioBtn">Сохранить</button>
                        <button class="cancel" id="cancelModal">Отмена</button>
                    </div>
                `;
                modal.classList.add('active');
                document.getElementById('saveBioBtn').onclick = () => {
                    artistBio = document.getElementById('modalBio').value;
                    saveData();
                    modal.classList.remove('active');
                };
                document.getElementById('cancelModal').onclick = () => modal.classList.remove('active');
            }

            function openEditContactsModal() {
                if (!isAdmin) return;
                const modal = document.getElementById('editModal');
                const content = document.getElementById('editModalContent');
                content.innerHTML = `
                    <h3>✎ Контакты</h3>
                    <input id="modalTg" value="${escapeHtml(contacts.tg)}" placeholder="Telegram: @username">
                    <input id="modalWa" value="${escapeHtml(contacts.wa)}" placeholder="WhatsApp: +7...">
                    <input id="modalVk" value="${escapeHtml(contacts.vk)}" placeholder="VK: vk.com/...">
                    <input id="modalTgk" value="${escapeHtml(contacts.tgk)}" placeholder="Telegram канал: t.me/...">
                    <div class="modal-buttons">
                        <button id="saveContactsBtn">Сохранить</button>
                        <button class="cancel" id="cancelModal">Отмена</button>
                    </div>
                `;
                modal.classList.add('active');
                document.getElementById('saveContactsBtn').onclick = () => {
                    contacts = {
                        tg: document.getElementById('modalTg').value || '@',
                        wa: document.getElementById('modalWa').value || '+7',
                        vk: document.getElementById('modalVk').value || '',
                        tgk: document.getElementById('modalTgk').value || ''
                    };
                    saveData();
                    modal.classList.remove('active');
                };
                document.getElementById('cancelModal').onclick = () => modal.classList.remove('active');
            }

            // ========== РЕНДЕРИНГ ==========
            function renderAll() {
                renderBio();
                renderExhibition();
                renderShop();
                renderContacts();
            }

            function renderBio() {
                const bioDiv = document.getElementById('artistBioDisplay');
                if (bioDiv) {
                    bioDiv.innerHTML = `${escapeHtml(artistBio).replace(/\n/g, '<br>')}<button class="edit-bio-btn edit-btn" id="editBioBtn">✎</button>`;
                    document.getElementById('editBioBtn')?.addEventListener('click', openEditBioModal);
                }
            }

            function renderExhibition() {
                const grid = document.getElementById('exhibitionGrid');
                if (!grid) return;
                if (!artworks.exhibition.length) {
                    grid.innerHTML = '<p style="text-align:center; color:#888; padding:40px;">Пока нет работ</p>';
                    return;
                }
                grid.innerHTML = artworks.exhibition.map(item => `
                    <div class="art-card">
                        <div class="art-image-container" onclick="window.openZoom('${escapeHtml(item.image_url)}', '${escapeHtml(item.title)}', '${escapeHtml(item.description)}')">
                            <img class="art-image" src="${escapeHtml(item.image_url)}" alt="${escapeHtml(item.title)}" onerror="this.onerror=null; this.parentElement.innerHTML+='<div class=\\'image-error\\'>🖼️ Ошибка загрузки</div>';">
                            <div class="zoom-icon">🔍</div>
                        </div>
                        <div class="art-title">${escapeHtml(item.title)}</div>
                        <div class="art-description">${escapeHtml(item.description) || '—'}</div>
                        ${isAdmin ? `<button class="edit-btn" onclick="window.deleteItem('${item.id}', 'exhibition')">🗑️</button>` : ''}
                    </div>
                `).join('');
            }

            function renderShop() {
                const grid = document.getElementById('shopGrid');
                if (!grid) return;
                if (!artworks.shop.length) {
                    grid.innerHTML = '<p style="text-align:center; color:#888; padding:40px;">Магазин пуст</p>';
                    return;
                }
                grid.innerHTML = artworks.shop.map(item => `
                    <div class="art-card">
                        <div class="art-image-container" onclick="window.openZoom('${escapeHtml(item.image_url)}', '${escapeHtml(item.title)}', '${escapeHtml(item.description)}')">
                            <img class="art-image" src="${escapeHtml(item.image_url)}" alt="${escapeHtml(item.title)}" onerror="this.onerror=null; this.parentElement.innerHTML+='<div class=\\'image-error\\'>🖼️ Ошибка загрузки</div>';">
                            <div class="zoom-icon">🔍</div>
                        </div>
                        <div class="art-title">${escapeHtml(item.title)}</div>
                        <div class="art-description">${escapeHtml(item.description) || '—'}</div>
                        <div class="art-price">${escapeHtml(item.price) || 'цена по запросу'}</div>
                        ${isAdmin ? `<button class="edit-btn" onclick="window.deleteItem('${item.id}', 'shop')">🗑️</button>` : ''}
                    </div>
                `).join('');
            }

            function renderContacts() {
                const block = document.getElementById('contactsBlock');
                if (block) {
                    block.innerHTML = `
                        <a href="https://t.me/${contacts.tg.replace('@', '')}" target="_blank">📱 ${escapeHtml(contacts.tg)}</a>
                        <a href="https://wa.me/${contacts.wa.replace(/[^0-9]/g, '')}" target="_blank">📞 WhatsApp</a>
                        <a href="https://${contacts.vk.replace(/^https?:\/\//, '')}" target="_blank">📘 VK</a>
                        <a href="https://${contacts.tgk.replace(/^https?:\/\//, '')}" target="_blank">📢 Telegram канал</a>
                        <button class="edit-contacts-btn" id="editContactsBtn">✎ ред. контакты</button>
                    `;
                    document.getElementById('editContactsBtn')?.addEventListener('click', openEditContactsModal);
                }
            }

            // Глобальные функции
            window.openZoom = function(img, title, desc) {
                const zoomImg = document.getElementById('zoomImage');
                zoomImg.src = img;
                zoomImg.onerror = function() { this.src = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%23eee%22/%3E%3Ctext x=%2250%22 y=%22100%22%3EОшибка%3C/text%3E%3C/svg%3E'; };
                document.getElementById('zoomTitle').innerText = title;
                document.getElementById('zoomDescription').innerText = desc;
                document.getElementById('zoomModal').classList.add('active');
            };
            window.deleteItem = deleteItem;

            // ========== АДМИНКА ==========
            document.getElementById('submitPassword')?.addEventListener('click', () => {
                const pwd = document.getElementById('passwordInput').value;
                if (pwd === ADMIN_PASSWORD) {
                    isAdmin = true;
                    document.body.classList.add('admin-mode');
                    sessionStorage.setItem('bibl_admin', 'true');
                    document.getElementById('loginModal').classList.remove('active');
                    renderAll();
                    const url = new URL(window.location);
                    url.searchParams.delete('bibl_edit');
                    window.history.replaceState({}, '', url);
                } else alert('Неверный пароль');
            });
            document.getElementById('cancelLogin')?.addEventListener('click', () => document.getElementById('loginModal').classList.remove('active'));
            document.getElementById('addExhibitionBtn')?.addEventListener('click', () => openAddModal('exhibition'));
            document.getElementById('addShopBtn')?.addEventListener('click', () => openAddModal('shop'));
            
            // Навигация
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    document.getElementById(this.dataset.page + 'Page').classList.add('active');
                });
            });
            
            // Закрытие модалок по клику на фон
            window.addEventListener('click', (e) => {
                if (e.target.classList.contains('modal')) e.target.classList.remove('active');
            });
            
            // ========== ИДЕАЛЬНЫЙ ТЕТРИС ==========
            const canvas = document.getElementById('tetrisCanvas');
            const ctx = canvas?.getContext('2d');
            const scoreSpan = document.getElementById('gameScore');
            if (canvas && ctx) {
                const COLS = 10, ROWS = 20;
                const SIZE = canvas.width / COLS;
                let grid = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                let score = 0;
                let active = false, paused = false;
                let interval = null;
                let piece = null, pieceX = 0, pieceY = 0;
                
                const SHAPES = [
                    { shape: [[1,1,1,1]], color: '#faf9f7' },
                    { shape: [[1,1],[1,1]], color: '#faf9f7' },
                    { shape: [[0,1,0],[1,1,1]], color: '#faf9f7' },
                    { shape: [[0,1,1],[1,1,0]], color: '#faf9f7' },
                    { shape: [[1,1,0],[0,1,1]], color: '#faf9f7' },
                    { shape: [[1,0,0],[1,1,1]], color: '#faf9f7' },
                    { shape: [[0,0,1],[1,1,1]], color: '#faf9f7' }
                ];
                
                function randomPiece() {
                    const p = SHAPES[Math.floor(Math.random() * SHAPES.length)];
                    return { shape: p.shape.map(r => [...r]), color: p.color };
                }
                
                function spawn() {
                    piece = randomPiece();
                    pieceX = Math.floor((COLS - piece.shape[0].length) / 2);
                    pieceY = 0;
                    if (collision()) { gameOver(); }
                }
                
                function collision() {
                    for (let y = 0; y < piece.shape.length; y++) {
                        for (let x = 0; x < piece.shape[0].length; x++) {
                            if (piece.shape[y][x]) {
                                const nx = pieceX + x, ny = pieceY + y;
                                if (nx < 0 || nx >= COLS || ny >= ROWS || (ny >= 0 && grid[ny]?.[nx])) return true;
                            }
                        }
                    }
                    return false;
                }
                
                function merge() {
                    for (let y = 0; y < piece.shape.length; y++) {
                        for (let x = 0; x < piece.shape[0].length; x++) {
                            if (piece.shape[y][x]) {
                                const ny = pieceY + y, nx = pieceX + x;
                                if (ny >= 0 && ny < ROWS) grid[ny][nx] = 1;
                            }
                        }
                    }
                    clearLines();
                    spawn();
                }
                
                function clearLines() {
                    let cleared = 0;
                    for (let y = ROWS-1; y >= 0; y--) {
                        if (grid[y].every(c => c === 1)) {
                            grid.splice(y, 1);
                            grid.unshift(Array(COLS).fill(0));
                            y++;
                            cleared++;
                        }
                    }
                    if (cleared) { score += cleared * 100; scoreSpan.textContent = score; }
                }
                
                function move(dx, dy) {
                    if (!active || paused) return false;
                    pieceX += dx; pieceY += dy;
                    if (collision()) {
                        pieceX -= dx; pieceY -= dy;
                        if (dy === 1) { merge(); }
                        return false;
                    }
                    return true;
                }
                
                function rotate() {
                    if (!active || paused) return;
                    const rotated = piece.shape[0].map((_, i) => piece.shape.map(row => row[i]).reverse());
                    const old = piece.shape.map(r => [...r]);
                    piece.shape = rotated;
                    if (collision()) piece.shape = old;
                }
                
                function gameOver() {
                    active = false;
                    if (interval) clearInterval(interval);
                    interval = null;
                }
                
                function draw() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.strokeStyle = '#faf9f7';
                    for (let y = 0; y < ROWS; y++) {
                        for (let x = 0; x < COLS; x++) {
                            if (grid[y][x]) { ctx.fillStyle = '#faf9f7'; ctx.fillRect(x*SIZE, y*SIZE, SIZE-1, SIZE-1); }
                            else ctx.strokeRect(x*SIZE, y*SIZE, SIZE-1, SIZE-1);
                        }
                    }
                    if (piece && active) {
                        ctx.fillStyle = '#faf9f7';
                        for (let y = 0; y < piece.shape.length; y++)
                            for (let x = 0; x < piece.shape[0].length; x++)
                                if (piece.shape[y][x]) ctx.fillRect((pieceX+x)*SIZE, (pieceY+y)*SIZE, SIZE-1, SIZE-1);
                    }
                    if (paused && active) {
                        ctx.fillStyle = 'rgba(0,0,0,0.6)';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = '#faf9f7';
                        ctx.font = '20px Georgia';
                        ctx.textAlign = 'center';
                        ctx.fillText('ПАУЗА', canvas.width/2, canvas.height/2);
                    }
                    if (!active) {
                        ctx.fillStyle = 'rgba(0,0,0,0.7)';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = '#faf9f7';
                        ctx.font = '20px Georgia';
                        ctx.fillText('ИГРА ОКОНЧЕНА', canvas.width/2, canvas.height/2);
                    }
                }
                
                function loop() { if (active && !paused) { move(0, 1); draw(); } else draw(); }
                
                function startNew() {
                    if (interval) clearInterval(interval);
                    grid = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                    score = 0;
                    scoreSpan.textContent = '0';
                    active = true;
                    paused = false;
                    spawn();
                    interval = setInterval(loop, 280);
                    draw();
                }
                
                document.addEventListener('keydown', (e) => {
                    if (!document.getElementById('gamePage').classList.contains('active')) return;
                    if (!active) return;
                    if (e.key === 'ArrowLeft') { e.preventDefault(); move(-1, 0); draw(); }
                    if (e.key === 'ArrowRight') { e.preventDefault(); move(1, 0); draw(); }
                    if (e.key === 'ArrowDown') { e.preventDefault(); move(0, 1); draw(); }
                    if (e.key === 'ArrowUp') { e.preventDefault(); rotate(); draw(); }
                });
                
                document.getElementById('moveLeftBtn')?.addEventListener('click', () => { if(active && !paused) { move(-1,0); draw(); } });
                document.getElementById('moveRightBtn')?.addEventListener('click', () => { if(active && !paused) { move(1,0); draw(); } });
                document.getElementById('moveDownBtn')?.addEventListener('click', () => { if(active && !paused) { move(0,1); draw(); } });
                document.getElementById('rotateBtn')?.addEventListener('click', () => { if(active && !paused) { rotate(); draw(); } });
                document.getElementById('newGameBtn')?.addEventListener('click', startNew);
                document.getElementById('pauseGameBtn')?.addEventListener('click', () => { if(active) { paused = !paused; draw(); } });
                startNew();
            }
            
            loadData();
        })();
    </script>
</body>
</html>
