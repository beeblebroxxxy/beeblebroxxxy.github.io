<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>библ • художественная выставка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background-color: #faf9f7; color: #1e1e1e; line-height: 1.6; }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px 5%; }
        header { border-bottom: 1px solid #d0d0d0; padding-bottom: 20px; margin-bottom: 30px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; }
        .logo { font-size: 2.8rem; font-weight: 300; letter-spacing: 4px; text-transform: lowercase; border: 1px solid #333; padding: 5px 15px; }
        nav { display: flex; gap: 15px; }
        nav button { background: none; border: none; font-size: 1.2rem; font-family: 'Georgia', serif; cursor: pointer; padding: 5px 0; border-bottom: 2px solid transparent; }
        nav button.active { border-bottom: 2px solid #1e1e1e; }
        .auth-area button { background: none; border: 1px solid #aaa; padding: 8px 16px; cursor: pointer; }
        .page { display: none; }
        .page.active { display: block; }
        h1 { font-size: 2.8rem; font-weight: 300; margin-bottom: 30px; border-left: 3px solid #1e1e1e; padding-left: 20px; }
        .art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
        .art-card { background: white; border: 1px solid #eaeaea; padding: 20px; position: relative; }
        .art-image-container { position: relative; aspect-ratio: 1/1.1; cursor: pointer; overflow: hidden; background: #f0f0f0; }
        .art-image { width: 100%; height: 100%; object-fit: cover; }
        .zoom-icon { position: absolute; top: 10px; right: 10px; width: 40px; height: 40px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; }
        .art-image-container:hover .zoom-icon { opacity: 1; }
        .art-title { font-size: 1.4rem; margin: 10px 0 5px; }
        .art-description { color: #5a5a5a; font-size: 0.9rem; font-style: italic; }
        .art-price { font-size: 1.3rem; color: #2b5e2b; border-top: 1px dashed #ccc; padding-top: 12px; margin-top: 10px; }
        .contact-block { margin-top: 40px; padding: 20px; background: #f3f2f0; display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; position: relative; }
        .admin-mode .edit-btn { display: flex; }
        .edit-btn { position: absolute; top: 10px; right: 10px; width: 36px; height: 36px; border-radius: 50%; background: white; border: 1px solid #1e1e1e; display: none; align-items: center; justify-content: center; cursor: pointer; }
        .add-btn { background: white; border: 1px solid #1e1e1e; border-radius: 40px; padding: 8px 20px; margin: 20px 0; cursor: pointer; display: none; }
        .admin-mode .add-btn { display: inline-block; }
        .edit-contacts-btn { position: absolute; top: -18px; right: 20px; background: #1e1e1e; color: white; border: none; border-radius: 30px; padding: 8px 20px; cursor: pointer; display: none; }
        .admin-mode .edit-contacts-btn { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 2000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 35px; max-width: 550px; width: 100%; }
        .artist-bio { font-size: 1.2rem; white-space: pre-line; max-width: 800px; margin: 0 auto 30px; padding: 20px; position: relative; }
        .bio-edit-btn { position: absolute; top: 10px; right: 10px; width: 36px; height: 36px; border-radius: 50%; background: white; border: 1px solid #1e1e1e; display: none; align-items: center; justify-content: center; cursor: pointer; }
        .admin-mode .bio-edit-btn { display: flex; }
        .zoom-modal .modal-content { max-width: 800px; background: transparent; padding: 0; }
        .zoom-image { width: 100%; max-height: 70vh; object-fit: contain; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">библ</div>
            <nav>
                <button class="nav-btn active" data-page="about">О художнице</button>
                <button class="nav-btn" data-page="exhibition">Выставка</button>
                <button class="nav-btn" data-page="shop">Магазин</button>
                <button class="nav-btn" data-page="game">Игра</button>
            </nav>
            <div class="auth-area">
                <button id="loginBtn">Войти</button>
                <button id="logoutBtn" style="display:none;">Выйти</button>
            </div>
        </header>

        <div id="loginModal" class="modal">
            <div class="modal-content">
                <h3>доступ</h3>
                <input type="password" id="passwordInput" placeholder="пароль">
                <div class="modal-buttons">
                    <button id="submitPassword">Войти</button>
                    <button class="cancel" id="cancelLogin">Отмена</button>
                </div>
            </div>
        </div>

        <div id="editModal" class="modal">
            <div class="modal-content" id="editModalContent"></div>
        </div>

        <div id="zoomModal" class="modal zoom-modal">
            <div class="modal-content zoom-content">
                <img id="zoomImage" class="zoom-image" src="">
                <div class="zoom-details">
                    <h3 id="zoomTitle"></h3>
                    <p id="zoomDescription"></p>
                    <button class="cancel" onclick="document.getElementById('zoomModal').classList.remove('active')">Закрыть</button>
                </div>
            </div>
        </div>

        <section id="aboutPage" class="page active">
            <h1>библ</h1>
            <div class="artist-bio" id="artistBioDisplay"></div>
        </section>

        <section id="exhibitionPage" class="page">
            <h1>выставка</h1>
            <button class="add-btn" id="addExhibitionBtn">➕ Добавить работу</button>
            <div class="art-grid" id="exhibitionGrid"></div>
        </section>

        <section id="shopPage" class="page">
            <h1>магазин</h1>
            <button class="add-btn" id="addShopBtn">➕ Добавить товар</button>
            <div class="art-grid" id="shopGrid"></div>
            <div class="contact-block" id="contactsBlock"></div>
        </section>

        <section id="gamePage" class="page">
            <h1>тетрис / пауза</h1>
            <p>Игра временно отключена</p>
        </section>
    </div>

    <script>
        (function() {
            document.addEventListener('DOMContentLoaded', function() {
                
                const ADMIN_PASSWORD = 'BiblVeta098123';
                let isAdmin = false;
                
                // Данные сайта
                let artworks = { exhibition: [], shop: [] };
                let artistBio = "Художница из Петербурга. Работаю с маслом, акрилом, текстилем. Участница групповых выставок. Исследую фактуры и городскую тишину.";
                let contacts = {
                    tg: '@bibl_art',
                    wa: '+7 999 123-45-67',
                    vk: 'vk.com/bibl.art',
                    tgk: 't.me/bibl_channel'
                };

                // Загрузка из localStorage
                function loadData() {
                    const saved = localStorage.getItem('biblSiteData');
                    if (saved) {
                        try {
                            const data = JSON.parse(saved);
                            artworks = data.artworks || { exhibition: [], shop: [] };
                            artistBio = data.artistBio || artistBio;
                            contacts = data.contacts || contacts;
                        } catch (e) {}
                    }
                    renderAll();
                }

                // Сохранение в localStorage
                function saveData() {
                    localStorage.setItem('biblSiteData', JSON.stringify({
                        artworks: artworks,
                        artistBio: artistBio,
                        contacts: contacts
                    }));
                }

                // Проверка bibl_edit
                if (new URLSearchParams(window.location.search).has('bibl_edit')) {
                    document.getElementById('loginModal')?.classList.add('active');
                }

                // Отображение
                function escapeHtml(text) {
                    if (!text) return '';
                    return text.replace(/[&<>"]/g, function(m) {
                        return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[m];
                    });
                }

                function renderAll() {
                    // Био
                    const bioDisplay = document.getElementById('artistBioDisplay');
                    if (bioDisplay) {
                        bioDisplay.innerHTML = escapeHtml(artistBio) + '<button class="bio-edit-btn" id="editBioBtn">✎</button>';
                        document.getElementById('editBioBtn')?.addEventListener('click', editBio);
                    }

                    // Выставка
                    const exhGrid = document.getElementById('exhibitionGrid');
                    if (exhGrid) {
                        exhGrid.innerHTML = artworks.exhibition.map(item => `
                            <div class="art-card">
                                <div class="art-image-container" onclick="window.openZoom('${item.image_url}', '${escapeHtml(item.title)}', '${escapeHtml(item.description)}')">
                                    <img class="art-image" src="${item.image_url}" alt="${escapeHtml(item.title)}">
                                    <div class="zoom-icon">🔍</div>
                                </div>
                                <div class="art-title">${escapeHtml(item.title)}</div>
                                <div class="art-description">${escapeHtml(item.description) || '—'}</div>
                                ${isAdmin ? `<button class="edit-btn" onclick="window.deleteItem('${item.id}', 'exhibition')">🗑️</button>` : ''}
                            </div>
                        `).join('');
                    }

                    // Магазин
                    const shopGrid = document.getElementById('shopGrid');
                    if (shopGrid) {
                        shopGrid.innerHTML = artworks.shop.map(item => `
                            <div class="art-card">
                                <div class="art-image-container" onclick="window.openZoom('${item.image_url}', '${escapeHtml(item.title)}', '${escapeHtml(item.description)}')">
                                    <img class="art-image" src="${item.image_url}" alt="${escapeHtml(item.title)}">
                                    <div class="zoom-icon">🔍</div>
                                </div>
                                <div class="art-title">${escapeHtml(item.title)}</div>
                                <div class="art-description">${escapeHtml(item.description) || '—'}</div>
                                <div class="art-price">${escapeHtml(item.price) || 'цена по запросу'}</div>
                                ${isAdmin ? `<button class="edit-btn" onclick="window.deleteItem('${item.id}', 'shop')">🗑️</button>` : ''}
                            </div>
                        `).join('');
                    }

                    // Контакты
                    const contactsBlock = document.getElementById('contactsBlock');
                    if (contactsBlock) {
                        contactsBlock.innerHTML = `
                            <a href="https://t.me/${contacts.tg.replace('@','')}" target="_blank">📱 TG: ${contacts.tg}</a>
                            <a href="https://wa.me/${contacts.wa.replace(/[^0-9]/g, '')}" target="_blank">📞 WhatsApp</a>
                            <a href="https://${contacts.vk}" target="_blank">📘 VK: ${contacts.vk}</a>
                            <a href="https://${contacts.tgk}" target="_blank">📢 Канал: ${contacts.tgk}</a>
                            <button class="edit-contacts-btn" id="editContactsBtn">✎ ред. контакты</button>
                        `;
                        document.getElementById('editContactsBtn')?.addEventListener('click', editContacts);
                    }
                }

                // Глобальные функции
                window.openZoom = function(img, title, desc) {
                    document.getElementById('zoomImage').src = img;
                    document.getElementById('zoomTitle').innerText = title;
                    document.getElementById('zoomDescription').innerText = desc;
                    document.getElementById('zoomModal').classList.add('active');
                };

                window.deleteItem = function(id, section) {
                    if (!isAdmin) return;
                    if (confirm('Удалить?')) {
                        artworks[section] = artworks[section].filter(item => item.id != id);
                        saveData();
                        renderAll();
                    }
                };

                // Редактирование био
                function editBio() {
                    if (!isAdmin) return;
                    const modal = document.getElementById('editModal');
                    const content = document.getElementById('editModalContent');
                    content.innerHTML = `
                        <h3>Редактировать описание</h3>
                        <textarea id="modalBio" rows="6">${escapeHtml(artistBio)}</textarea>
                        <div class="modal-buttons">
                            <button id="saveBioBtn">Сохранить</button>
                            <button class="cancel" id="cancelModal">Отмена</button>
                        </div>
                    `;
                    modal.classList.add('active');
                    
                    document.getElementById('saveBioBtn').onclick = () => {
                        artistBio = document.getElementById('modalBio').value;
                        saveData();
                        renderAll();
                        modal.classList.remove('active');
                    };
                    document.getElementById('cancelModal').onclick = () => modal.classList.remove('active');
                }

                // Редактирование контактов
                function editContacts() {
                    if (!isAdmin) return;
                    const modal = document.getElementById('editModal');
                    const content = document.getElementById('editModalContent');
                    content.innerHTML = `
                        <h3>Редактировать контакты</h3>
                        <input id="modalTg" value="${escapeHtml(contacts.tg)}">
                        <input id="modalWa" value="${escapeHtml(contacts.wa)}">
                        <input id="modalVk" value="${escapeHtml(contacts.vk)}">
                        <input id="modalTgk" value="${escapeHtml(contacts.tgk)}">
                        <div class="modal-buttons">
                            <button id="saveContactsBtn">Сохранить</button>
                            <button class="cancel" id="cancelModal">Отмена</button>
                        </div>
                    `;
                    modal.classList.add('active');
                    
                    document.getElementById('saveContactsBtn').onclick = () => {
                        contacts = {
                            tg: document.getElementById('modalTg').value,
                            wa: document.getElementById('modalWa').value,
                            vk: document.getElementById('modalVk').value,
                            tgk: document.getElementById('modalTgk').value
                        };
                        saveData();
                        renderAll();
                        modal.classList.remove('active');
                    };
                    document.getElementById('cancelModal').onclick = () => modal.classList.remove('active');
                }

                // Добавление работ
                document.getElementById('addExhibitionBtn')?.addEventListener('click', () => {
                    if (!isAdmin) return;
                    const title = prompt('Название:', 'Без названия') || 'Без названия';
                    const desc = prompt('Описание:', '') || '';
                    const img = prompt('ССЫЛКА на Imgur:', '');
                    if (!img) return alert('Нужна ссылка!');
                    
                    artworks.exhibition.push({
                        id: Date.now(),
                        title: title,
                        description: desc,
                        image_url: img
                    });
                    saveData();
                    renderAll();
                });

                document.getElementById('addShopBtn')?.addEventListener('click', () => {
                    if (!isAdmin) return;
                    const title = prompt('Название:', 'Без названия') || 'Без названия';
                    const desc = prompt('Описание:', '') || '';
                    const price = prompt('Цена:', 'цена по запросу') || 'цена по запросу';
                    const img = prompt('ССЫЛКА на Imgur:', '');
                    if (!img) return alert('Нужна ссылка!');
                    
                    artworks.shop.push({
                        id: Date.now(),
                        title: title,
                        description: desc,
                        price: price,
                        image_url: img
                    });
                    saveData();
                    renderAll();
                });

                // Авторизация
                document.getElementById('loginBtn').onclick = () => {
                    document.getElementById('loginModal').classList.add('active');
                };
                document.getElementById('cancelLogin').onclick = () => {
                    document.getElementById('loginModal').classList.remove('active');
                };
                document.getElementById('submitPassword').onclick = () => {
                    if (document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
                        isAdmin = true;
                        document.body.classList.add('admin-mode');
                        document.getElementById('loginModal').classList.remove('active');
                        renderAll();
                    } else {
                        alert('Неверный пароль');
                    }
                };
                document.getElementById('logoutBtn').onclick = () => {
                    isAdmin = false;
                    document.body.classList.remove('admin-mode');
                    renderAll();
                };

                // Навигация
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.onclick = () => {
                        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                        document.getElementById(btn.dataset.page + 'Page').classList.add('active');
                    };
                });

                // Закрытие модалок
                window.onclick = (e) => {
                    ['loginModal', 'editModal', 'zoomModal'].forEach(id => {
                        const modal = document.getElementById(id);
                        if (modal && e.target === modal) modal.classList.remove('active');
                    });
                };

                // Запуск
                loadData();
            });
        })();
    </script>
</body>
</html>
