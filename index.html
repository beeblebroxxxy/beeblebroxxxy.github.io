<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>библ • художественная выставка</title>
    <style>
        /* ВАШИ СТИЛИ (без изменений) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background-color: #faf9f7; color: #1e1e1e; line-height: 1.6; }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px 5%; }
        header { border-bottom: 1px solid #d0d0d0; padding-bottom: 20px; margin-bottom: 30px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; }
        .logo { font-size: 2.8rem; font-weight: 300; letter-spacing: 4px; text-transform: lowercase; border: 1px solid #333; padding: 5px 15px; }
        nav { display: flex; gap: 15px; }
        nav button { background: none; border: none; font-size: 1.2rem; font-family: 'Georgia', serif; cursor: pointer; padding: 5px 0; border-bottom: 2px solid transparent; }
        nav button.active { border-bottom: 2px solid #1e1e1e; }
        .auth-area button { background: none; border: 1px solid #aaa; padding: 8px 16px; cursor: pointer; }
        .page { display: none; }
        .page.active { display: block; }
        h1 { font-size: 2.8rem; font-weight: 300; margin-bottom: 30px; border-left: 3px solid #1e1e1e; padding-left: 20px; }
        .art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
        .art-card { background: white; border: 1px solid #eaeaea; padding: 20px; position: relative; }
        .art-image-container { position: relative; aspect-ratio: 1/1.1; cursor: pointer; overflow: hidden; background: #f0f0f0; }
        .art-image { width: 100%; height: 100%; object-fit: cover; }
        .zoom-icon { position: absolute; top: 10px; right: 10px; width: 40px; height: 40px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
        .art-image-container:hover .zoom-icon { opacity: 1; }
        .art-title { font-size: 1.4rem; margin: 10px 0 5px; }
        .art-description { color: #5a5a5a; font-size: 0.9rem; font-style: italic; }
        .art-price { font-size: 1.3rem; color: #2b5e2b; border-top: 1px dashed #ccc; padding-top: 12px; margin-top: 10px; }
        .contact-block { margin-top: 40px; padding: 20px; background: #f3f2f0; display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; position: relative; }
        .admin-mode .edit-btn { display: flex; }
        .edit-btn { position: absolute; top: 10px; right: 10px; width: 36px; height: 36px; border-radius: 50%; background: white; border: 1px solid #1e1e1e; display: none; align-items: center; justify-content: center; cursor: pointer; }
        .add-btn { background: white; border: 1px solid #1e1e1e; border-radius: 40px; padding: 8px 20px; margin: 20px 0; cursor: pointer; display: none; }
        .admin-mode .add-btn { display: inline-block; }
        .edit-contacts-btn { position: absolute; top: -18px; right: 20px; background: #1e1e1e; color: white; border: none; border-radius: 30px; padding: 8px 20px; cursor: pointer; display: none; }
        .admin-mode .edit-contacts-btn { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 2000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 35px; max-width: 550px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal-content h3 { font-size: 2rem; font-weight: 300; margin-bottom: 25px; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #bbb; font-family: 'Georgia', serif; }
        .modal-buttons { display: flex; gap: 15px; }
        .modal-content button { padding: 12px 30px; background: #1e1e1e; color: white; border: none; cursor: pointer; }
        .modal-content button.cancel { background: #8f8f8f; }
        .artist-bio { font-size: 1.2rem; white-space: pre-line; max-width: 800px; margin: 0 auto 30px; padding: 20px; position: relative; }
        .bio-edit-btn { position: absolute; top: 10px; right: 10px; width: 36px; height: 36px; border-radius: 50%; background: white; border: 1px solid #1e1e1e; display: none; align-items: center; justify-content: center; cursor: pointer; }
        .admin-mode .bio-edit-btn { display: flex; }
        .zoom-modal .modal-content { max-width: 800px; background: transparent; padding: 0; }
        .zoom-image { width: 100%; max-height: 70vh; object-fit: contain; }
        .game-container { background: #1e1e1e; color: #faf9f7; padding: 20px; border-radius: 4px; text-align: center; }
        canvas#tetrisCanvas { border: 2px solid #faf9f7; background: #000; max-width: 300px; width: 100%; aspect-ratio: 1/2; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">библ</div>
            <nav>
                <button class="nav-btn active" data-page="about">О художнице</button>
                <button class="nav-btn" data-page="exhibition">Выставка</button>
                <button class="nav-btn" data-page="shop">Магазин</button>
                <button class="nav-btn" data-page="game">Игра</button>
            </nav>
            <div class="auth-area">
                <button id="loginBtn">Войти</button>
                <button id="logoutBtn" style="display:none;">Выйти</button>
            </div>
        </header>

        <!-- Модалки -->
        <div id="loginModal" class="modal">
            <div class="modal-content">
                <h3>доступ</h3>
                <input type="password" id="passwordInput" placeholder="пароль">
                <div class="modal-buttons">
                    <button id="submitPassword">Войти</button>
                    <button class="cancel" id="cancelLogin">Отмена</button>
                </div>
            </div>
        </div>

        <div id="editModal" class="modal">
            <div class="modal-content" id="editModalContent"></div>
        </div>

        <div id="zoomModal" class="modal zoom-modal">
            <div class="modal-content zoom-content">
                <img id="zoomImage" class="zoom-image" src="">
                <div class="zoom-details">
                    <h3 id="zoomTitle"></h3>
                    <p id="zoomDescription"></p>
                    <button class="cancel" onclick="document.getElementById('zoomModal').classList.remove('active')">Закрыть</button>
                </div>
            </div>
        </div>

        <!-- Страницы -->
        <section id="aboutPage" class="page active">
            <h1>библ</h1>
            <div class="artist-bio" id="artistBioDisplay"></div>
        </section>

        <section id="exhibitionPage" class="page">
            <h1>выставка</h1>
            <button class="add-btn" id="addExhibitionBtn">➕ Добавить работу</button>
            <div class="art-grid" id="exhibitionGrid"></div>
        </section>

        <section id="shopPage" class="page">
            <h1>магазин</h1>
            <button class="add-btn" id="addShopBtn">➕ Добавить товар</button>
            <div class="art-grid" id="shopGrid"></div>
            <div class="contact-block" id="contactsBlock"></div>
        </section>

        <section id="gamePage" class="page">
            <h1>тетрис / пауза</h1>
            <div class="game-container">
                <canvas id="tetrisCanvas" width="300" height="600"></canvas>
                <div class="score" id="gameScore">0</div>
                <div>
                    <button class="game-btn" id="newGameBtn">Новая</button>
                    <button class="game-btn" id="pauseGameBtn">Пауза</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        (function() {
            // ЖДЁМ ЗАГРУЗКИ СТРАНИЦЫ
            document.addEventListener('DOMContentLoaded', function() {
                
                const WORKER_URL = 'https://bibl-api-final-2.stef-ruprecht.workers.dev';
                const ADMIN_PASSWORD = 'BiblVeta098123';

                let isAdmin = false;
                let artworks = { exhibition: [], shop: [] };
                let artistBio = "";
                let contacts = { tg: '', wa: '', vk: '', tgk: '' };

                // ========== ПРОВЕРЯЕМ bibl_edit ==========
                const urlParams = new URLSearchParams(window.location.search);
                const loginModal = document.getElementById('loginModal');
                if (urlParams.has('bibl_edit') && loginModal) {
                    loginModal.classList.add('active');
                }

                // ========== ЗАГРУЗКА ДАННЫХ ==========
                async function loadAllData() {
                    try {
                        const artworksRes = await fetch(`${WORKER_URL}/api/artworks`);
                        const artworksData = await artworksRes.json();
                        artworks.exhibition = artworksData.filter(item => item.section === 'exhibition');
                        artworks.shop = artworksData.filter(item => item.section === 'shop');

                        const bioRes = await fetch(`${WORKER_URL}/api/bio`);
                        if (bioRes.ok) {
                            const bioData = await bioRes.json();
                            artistBio = bioData.text || "Художница из Петербурга...";
                        }

                        const contactsRes = await fetch(`${WORKER_URL}/api/contacts`);
                        if (contactsRes.ok) {
                            contacts = await contactsRes.json();
                        }
                    } catch (e) {
                        console.error('Ошибка загрузки:', e);
                    }
                    renderAll();
                }

                // ========== СОХРАНЕНИЕ ==========
                async function saveBio(newBio) {
                    if (!isAdmin) return;
                    await fetch(`${WORKER_URL}/api/bio`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: newBio })
                    });
                    artistBio = newBio;
                    renderBio();
                }

                async function saveContacts(newContacts) {
                    if (!isAdmin) return;
                    await fetch(`${WORKER_URL}/api/contacts`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newContacts)
                    });
                    contacts = newContacts;
                    renderContacts();
                }

                async function deleteArtwork(id) {
                    if (!isAdmin) return;
                    if (confirm('Удалить?')) {
                        await fetch(`${WORKER_URL}/api/artworks/${id}`, { method: 'DELETE' });
                        loadAllData();
                    }
                }

                // ========== ОТОБРАЖЕНИЕ ==========
                function escapeHtml(unsafe) {
                    return unsafe ? unsafe.replace(/[&<>"]/g, function(m) {
                        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m];
                    }) : '';
                }

                function renderAll() {
                    renderBio();
                    renderExhibition();
                    renderShop();
                    renderContacts();
                }

                function renderBio() {
                    const bioDisplay = document.getElementById('artistBioDisplay');
                    if (bioDisplay) {
                        bioDisplay.innerHTML = `${escapeHtml(artistBio)} <button class="bio-edit-btn" id="editBioBtn">✎</button>`;
                        document.getElementById('editBioBtn')?.addEventListener('click', openEditBioModal);
                    }
                }

                function renderExhibition() {
                    const grid = document.getElementById('exhibitionGrid');
                    if (grid) {
                        grid.innerHTML = artworks.exhibition.map(item => `
                            <div class="art-card" data-id="${item.id}">
                                <div class="art-image-container" onclick="window.openZoom('${item.image_url}', '${escapeHtml(item.title)}', '${escapeHtml(item.description)}')">
                                    <img class="art-image" src="${item.image_url}" alt="${escapeHtml(item.title)}">
                                    <div class="zoom-icon">🔍</div>
                                </div>
                                <div class="art-title">${escapeHtml(item.title)}</div>
                                <div class="art-description">${escapeHtml(item.description) || '—'}</div>
                                ${isAdmin ? `<button class="edit-btn" onclick="deleteArtwork(${item.id})">🗑️</button>` : ''}
                            </div>
                        `).join('');
                    }
                }

                function renderShop() {
                    const grid = document.getElementById('shopGrid');
                    if (grid) {
                        grid.innerHTML = artworks.shop.map(item => `
                            <div class="art-card" data-id="${item.id}">
                                <div class="art-image-container" onclick="window.openZoom('${item.image_url}', '${escapeHtml(item.title)}', '${escapeHtml(item.description)}')">
                                    <img class="art-image" src="${item.image_url}" alt="${escapeHtml(item.title)}">
                                    <div class="zoom-icon">🔍</div>
                                </div>
                                <div class="art-title">${escapeHtml(item.title)}</div>
                                <div class="art-description">${escapeHtml(item.description) || '—'}</div>
                                <div class="art-price">${escapeHtml(item.price) || 'цена по запросу'}</div>
                                ${isAdmin ? `<button class="edit-btn" onclick="deleteArtwork(${item.id})">🗑️</button>` : ''}
                            </div>
                        `).join('');
                    }
                }

                function renderContacts() {
                    const block = document.getElementById('contactsBlock');
                    if (block) {
                        block.innerHTML = `
                            <a href="https://t.me/${(contacts.tg || '@bibl_art').replace('@','')}" target="_blank">📱 TG: ${contacts.tg || '@bibl_art'}</a>
                            <a href="https://wa.me/${(contacts.wa || '+79991234567').replace(/[^0-9]/g, '')}" target="_blank">📞 WhatsApp</a>
                            <a href="https://${contacts.vk || 'vk.com/bibl.art'}" target="_blank">📘 VK: ${contacts.vk || 'vk.com/bibl.art'}</a>
                            <a href="https://${contacts.tgk || 't.me/bibl_channel'}" target="_blank">📢 Канал: ${contacts.tgk || 't.me/bibl_channel'}</a>
                            <button class="edit-contacts-btn" id="editContactsBtn">✎ ред. контакты</button>
                        `;
                        document.getElementById('editContactsBtn')?.addEventListener('click', openEditContactsModal);
                    }
                }

                window.openZoom = function(image, title, description) {
                    const zoomModal = document.getElementById('zoomModal');
                    const zoomImage = document.getElementById('zoomImage');
                    const zoomTitle = document.getElementById('zoomTitle');
                    const zoomDesc = document.getElementById('zoomDescription');
                    if (zoomModal && zoomImage && zoomTitle && zoomDesc) {
                        zoomImage.src = image;
                        zoomTitle.innerText = title;
                        zoomDesc.innerText = description;
                        zoomModal.classList.add('active');
                    }
                };

                window.deleteArtwork = deleteArtwork;

                // ========== РЕДАКТИРОВАНИЕ БИО ==========
                function openEditBioModal() {
                    if (!isAdmin) return;
                    const modal = document.getElementById('editModal');
                    const content = document.getElementById('editModalContent');
                    if (!modal || !content) return;
                    
                    content.innerHTML = `
                        <h3>Редактировать описание</h3>
                        <textarea id="modalBio" rows="6">${escapeHtml(artistBio)}</textarea>
                        <div class="modal-buttons">
                            <button id="saveBioBtn">Сохранить</button>
                            <button class="cancel" id="cancelModal">Отмена</button>
                        </div>
                    `;
                    modal.classList.add('active');
                    
                    document.getElementById('saveBioBtn')?.addEventListener('click', function() {
                        const bioInput = document.getElementById('modalBio');
                        if (bioInput) {
                            saveBio(bioInput.value);
                        }
                        modal.classList.remove('active');
                    });
                    
                    document.getElementById('cancelModal')?.addEventListener('click', function() {
                        modal.classList.remove('active');
                    });
                }

                // ========== РЕДАКТИРОВАНИЕ КОНТАКТОВ ==========
                function openEditContactsModal() {
                    if (!isAdmin) return;
                    const modal = document.getElementById('editModal');
                    const content = document.getElementById('editModalContent');
                    if (!modal || !content) return;
                    
                    content.innerHTML = `
                        <h3>Редактировать контакты</h3>
                        <input id="modalTg" placeholder="Telegram" value="${escapeHtml(contacts.tg || '')}">
                        <input id="modalWa" placeholder="WhatsApp" value="${escapeHtml(contacts.wa || '')}">
                        <input id="modalVk" placeholder="VK" value="${escapeHtml(contacts.vk || '')}">
                        <input id="modalTgk" placeholder="Канал Telegram" value="${escapeHtml(contacts.tgk || '')}">
                        <div class="modal-buttons">
                            <button id="saveContactsBtn">Сохранить</button>
                            <button class="cancel" id="cancelModal">Отмена</button>
                        </div>
                    `;
                    modal.classList.add('active');
                    
                    document.getElementById('saveContactsBtn')?.addEventListener('click', function() {
                        const newContacts = {
                            tg: document.getElementById('modalTg')?.value || '',
                            wa: document.getElementById('modalWa')?.value || '',
                            vk: document.getElementById('modalVk')?.value || '',
                            tgk: document.getElementById('modalTgk')?.value || ''
                        };
                        saveContacts(newContacts);
                        modal.classList.remove('active');
                    });
                    
                    document.getElementById('cancelModal')?.addEventListener('click', function() {
                        modal.classList.remove('active');
                    });
                }

                // ========== ДОБАВЛЕНИЕ РАБОТ (ЧЕРЕЗ ССЫЛКУ) ==========
                document.getElementById('addExhibitionBtn')?.addEventListener('click', function() {
                    if (!isAdmin) return;
                    
                    const title = prompt('Название работы:', 'Без названия') || 'Без названия';
                    const description = prompt('Описание:', '') || '';
                    const image_url = prompt('ССЫЛКА на фото (Imgur или другой хостинг):', '');
                    
                    if (!image_url) {
                        alert('Нужно указать ссылку на фото');
                        return;
                    }
                    
                    const formData = new FormData();
                    formData.append('title', title);
                    formData.append('description', description);
                    formData.append('section', 'exhibition');
                    formData.append('image_url', image_url);
                    
                    fetch(`${WORKER_URL}/api/artworks`, {
                        method: 'POST',
                        body: formData
                    })
                    .then(res => res.ok ? loadAllData() : alert('Ошибка'))
                    .catch(e => alert('Ошибка: ' + e.message));
                });

                document.getElementById('addShopBtn')?.addEventListener('click', function() {
                    if (!isAdmin) return;
                    
                    const title = prompt('Название товара:', 'Без названия') || 'Без названия';
                    const description = prompt('Описание:', '') || '';
                    const price = prompt('Цена:', 'цена по запросу') || 'цена по запросу';
                    const image_url = prompt('ССЫЛКА на фото (Imgur или другой хостинг):', '');
                    
                    if (!image_url) {
                        alert('Нужно указать ссылку на фото');
                        return;
                    }
                    
                    const formData = new FormData();
                    formData.append('title', title);
                    formData.append('description', description);
                    formData.append('price', price);
                    formData.append('section', 'shop');
                    formData.append('image_url', image_url);
                    
                    fetch(`${WORKER_URL}/api/artworks`, {
                        method: 'POST',
                        body: formData
                    })
                    .then(res => res.ok ? loadAllData() : alert('Ошибка'))
                    .catch(e => alert('Ошибка: ' + e.message));
                });

                // ========== АВТОРИЗАЦИЯ ==========
                document.getElementById('loginBtn')?.addEventListener('click', function() {
                    document.getElementById('loginModal')?.classList.add('active');
                });
                
                document.getElementById('cancelLogin')?.addEventListener('click', function() {
                    document.getElementById('loginModal')?.classList.remove('active');
                });
                
                document.getElementById('submitPassword')?.addEventListener('click', function() {
                    const passwordInput = document.getElementById('passwordInput');
                    if (passwordInput && passwordInput.value === ADMIN_PASSWORD) {
                        isAdmin = true;
                        document.body.classList.add('admin-mode');
                        document.getElementById('loginModal')?.classList.remove('active');
                        loadAllData();
                    } else {
                        alert('Неверный пароль');
                    }
                });
                
                document.getElementById('logoutBtn')?.addEventListener('click', function() {
                    isAdmin = false;
                    document.body.classList.remove('admin-mode');
                    renderAll();
                });

                // ========== НАВИГАЦИЯ ==========
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                        const pageId = this.dataset.page + 'Page';
                        document.getElementById(pageId)?.classList.add('active');
                    });
                });

                // ========== ЗАКРЫТИЕ МОДАЛОК ==========
                window.addEventListener('click', function(e) {
                    const loginModal = document.getElementById('loginModal');
                    const editModal = document.getElementById('editModal');
                    const zoomModal = document.getElementById('zoomModal');
                    
                    if (loginModal && e.target === loginModal) loginModal.classList.remove('active');
                    if (editModal && e.target === editModal) editModal.classList.remove('active');
                    if (zoomModal && e.target === zoomModal) zoomModal.classList.remove('active');
                });

                // ========== ЗАПУСК ==========
                loadAllData();
                
            }); // Конец DOMContentLoaded
        })();
    </script>
</body>
</html>
